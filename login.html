<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Student Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {

            height: 100vh;

            background:
                linear-gradient(135deg,
                    #667eea,
                    #764ba2,
                    #ff6a00);

            display: flex;
            justify-content: center;
            align-items: center;

        }

        /* LOGIN CARD */

        .container {

            width: 380px;

            background:
                rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(18px);

            padding: 35px;

            border-radius: 20px;

            box-shadow:
                0 12px 30px rgba(0, 0, 0, 0.3);

            color: white;

            text-align: center;

            animation: fadeIn 0.8s ease;

        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        .icon {

            font-size: 45px;
            margin-bottom: 10px;

        }

        h2 {

            margin-bottom: 25px;

        }

        /* INPUT */

        .input-box {

            margin-bottom: 18px;

            text-align: left;

        }

        label {

            font-size: 13px;
            font-weight: 600;

            display: block;

            margin-bottom: 6px;

            color: #fff;

        }

        input {

            width: 100%;

            padding: 12px;

            border-radius: 10px;

            border: none;

            outline: none;

            font-size: 14px;

        }

        /* Password Toggle */

        .password-wrapper {

            position: relative;

        }

        .toggle {

            position: absolute;

            right: 10px;

            top: 50%;

            transform: translateY(-50%);

            cursor: pointer;

            color: black;

            font-size: 16px;

        }

        /* BUTTON */

        button {

            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 25px;

            background:
                linear-gradient(135deg,
                    #ff416c,
                    #ff4b2b);

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.25s;

            margin-top: 10px;

        }

        button:hover {

            transform: scale(1.05);

        }

        /* FOOTER */

        .footer {

            margin-top: 18px;

            font-size: 13px;

        }

        .footer a {

            color: #fff;

            text-decoration: underline;

            font-weight: 600;

        }

        /* Responsive */

        @media(max-width:420px) {

            .container {

                width: 90%;

                padding: 25px;

            }

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="icon">🍽️</div>

        <h2>Mess Login</h2>

        <form action="login.php" method="POST" autocomplete="off" id="loginForm">

            <!-- Hostel Roll -->

            <div class="input-box">

                <label>
                    Hostel Roll Number
                </label>

                <input type="text" name="hostel_roll" placeholder="Enter roll number" required maxlength="20" oninput="
this.value=
this.value.toUpperCase()">

            </div>

            <!-- Password -->

            <div class="input-box">

                <label>Password</label>

                <div class="password-wrapper">

                    <input type="password" id="password" name="password" placeholder="Enter password" required
                        maxlength="50">

                    <span class="toggle" onclick="togglePassword()">

                        👁️

                    </span>

                </div>

            </div>

            <button type="submit" id="loginBtn">

                🔐 Login

            </button>

        </form>

        <div class="footer">

            New user?

            <a href="register.html">

                Register here

            </a>

        </div>

    </div>

    <script>

        /* Toggle Password */

        function togglePassword() {

            let pass =
                document.getElementById("password");

            pass.type =
                (pass.type === "password")
                    ? "text"
                    : "password";

        }

        /* Prevent Multiple Submit */

        document
            .getElementById("loginForm")

            .addEventListener("submit",
                function () {

                    let btn =
                        document.getElementById("loginBtn");

                    btn.disabled = true;

                    btn.innerHTML =
                        "⏳ Logging in...";

                });

    </script>

</body>

</html>
